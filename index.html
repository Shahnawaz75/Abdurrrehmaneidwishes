<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Bakra Eid Surprise For You!</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: radial-gradient(circle, #0a2f1d, #02110a); /* Festively rich green background */
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
            color: #fff;
            padding: 20px;
        }

        /* Responsive Wrappers */
        .content-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Dynamic containers for both Form and Card */
        .form-box, .card {
            text-align: center;
            background: rgba(255, 255, 255, 0.04);
            padding: 5vh 5vw; /* Adaptive padding based on viewport dimensions */
            border-radius: 25px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 480px; /* Limits size on large screens */
            box-shadow: 0 8px 32px 0 rgba(6, 214, 160, 0.2);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .gift-icon {
            font-size: clamp(50px, 8vh, 80px); /* Dynamically sizes icons based on screen space */
            margin-bottom: 15px;
            animation: bounce 1.2s infinite alternate;
        }

        h2 {
            font-size: clamp(1.2rem, 2.5vw, 1.7rem);
            margin-bottom: 20px;
            color: #ffd700;
            line-height: 1.4;
        }

        .name-input {
            width: 100%;
            padding: 14px 20px;
            font-size: clamp(1rem, 2vw, 1.2rem);
            border: 2px solid #ffd700;
            border-radius: 50px;
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            outline: none;
            text-align: center;
            margin-bottom: 25px;
            transition: 0.3s;
        }

        .name-input:focus {
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
            background: rgba(0, 0, 0, 0.7);
        }

        .surprise-btn {
            background: linear-gradient(45deg, #ffd700, #ffaa00);
            color: #000;
            border: none;
            padding: 14px 40px;
            font-size: clamp(1rem, 2vw, 1.2rem);
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            width: auto;
            max-width: 100%;
        }

        .surprise-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.7);
        }

        /* Magical Greeting Card (Initially Hidden) */
        .card {
            transform: scale(0) rotate(-10deg);
            opacity: 0;
            display: none;
        }

        .card.reveal {
            display: block;
            transform: scale(1) rotate(0deg);
            opacity: 1;
        }

        h1 {
            font-size: clamp(2rem, 4.5vw, 2.8rem);
            margin-bottom: 15px;
            color: #ffd700;
            text-shadow: 0 0 15px #ffd700;
            animation: pulseGlow 2s infinite alternate;
            line-height: 1.2;
        }

        .friend-name {
            font-size: clamp(1.8rem, 4vw, 2.4rem);
            color: #ffaa00;
            margin: 15px 0;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 170, 0, 0.5);
            word-wrap: break-word; /* Prevents long names from breaking layouts */
        }

        p {
            font-size: clamp(1rem, 2.2vw, 1.25rem);
            line-height: 1.6;
            color: #e0e1dd;
            margin-bottom: 15px;
        }

        .sender {
            font-size: clamp(1.4rem, 3vw, 1.8rem);
            font-weight: bold;
            color: #06d6a0;
            text-shadow: 0 0 15px rgba(6, 214, 160, 0.4);
            margin-top: 20px;
            border-top: 1px dashed rgba(255,255,255,0.2);
            padding-top: 15px;
            line-height: 1.4;
        }

        /* Floating Animals Layer */
        .animal {
            position: absolute;
            font-size: clamp(25px, 5vw, 40px);
            bottom: -60px;
            pointer-events: none;
            z-index: 2;
            animation: floatUp 6s linear infinite;
            opacity: 0.8;
        }

        /* Adaptive Full-Screen Canvas for Fireworks */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Animation Keyframes */
        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-12px); }
        }

        @keyframes pulseGlow {
            from { text-shadow: 0 0 15px #ffd700; }
            to { text-shadow: 0 0 30px #ffaa00; }
        }

        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-110vh) translateX(50px) rotate(25deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas id="fireworksCanvas"></canvas>

    <audio id="eidMusic" loop>
        <source src="https://assets.mixkit.co/active_storage/sfx/123/123-200.wav" type="audio/wav">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
    </audio>

    <div class="content-wrapper">
        <div class="form-box" id="nameForm">
            <div class="gift-icon">🐐🐄🎁</div>
            <h2>Your Bakra Eid Surprise is Waiting!</h2>
            <input type="text" id="userInput" class="name-input" placeholder="Enter Your Name Here..." required>
            <br>
            <button class="surprise-btn" onclick="revealSurprise()">See Surprise!</button>
        </div>

        <div class="card" id="greetingCard">
            <h1>🐏 Eid-ul-Adha Mubarak 🐄</h1>
            <div class="friend-name" id="displayName">Dear Friend</div>
            <p>May your plate be full of delicious mutton, beef, and kababs, and your heart full of endless joy on this Bakra Eid!</p>
            <div class="sender">With Love From:<br>✨ Abdur Rehman ✨</div>
        </div>
    </div>

    <script>
        function revealSurprise() {
            var nameInput = document.getElementById('userInput').value.trim();
            
            if (nameInput === "") {
                alert("Please enter your name first! 😊");
                return;
            }

            document.getElementById('displayName').innerText = nameInput;
            document.getElementById('nameForm').style.display = 'none';
            
            var card = document.getElementById('greetingCard');
            card.style.display = 'block';
            setTimeout(function() {
                card.classList.add('reveal');
            }, 100);

            // Audio Playback
            var audio = document.getElementById('eidMusic');
            audio.play().catch(function(error) {
                console.log("Audio waiting for explicit interaction.");
            });

            // Start system visual engines
            initFireworks();
            startAnimalRain();
        }

        // --- Adaptive Animal Floatation System ---
        function startAnimalRain() {
            const animals = ['🐐', '🐄', '🐏', '✨', '🎈'];
            setInterval(() => {
                const animalEl = document.createElement('div');
                animalEl.classList.add('animal');
                animalEl.innerText = animals[Math.floor(Math.random() * animals.length)];
                animalEl.style.left = Math.random() * 95 + 'vw';
                animalEl.style.animationDuration = (Math.random() * 3 + 4) + 's';
                document.body.appendChild(animalEl);

                setTimeout(() => {
                    animalEl.remove();
                }, 7000);
            }, 700);
        }

        // --- Adaptive Fireworks System ---
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let particles = [];

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = Math.random() * 2 + 1;
                this.velocity = {
                    x: (Math.random() - 0.5) * (window.innerWidth < 600 ? 6 : 9), // Slower velocity scales for cleaner looks on mobile
                    y: (Math.random() - 0.5) * (window.innerWidth < 600 ? 6 : 9)
                };
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.015;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.velocity.y += 0.04; // Adaptive gravity rate
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= this.decay;
            }
        }

        function createFirework(x, y) {
            const colors = ['#ffd700', '#ffaa00', '#06d6a0', '#4cc9f0', '#ff007f', '#ffffff'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            const particleCount = window.innerWidth < 600 ? 30 : 50; // Fewer particles on phone screens to optimize performance
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle(x, y, randomColor));
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.fillStyle = 'rgba(10, 47, 29, 0.2)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach((particle, index) => {
                if (particle.alpha <= 0) {
                    particles.splice(index, 1);
                } else {
                    particle.update();
                    particle.draw();
                }
            });
        }

        function initFireworks() {
            animate();
            createFirework(canvas.width / 2, canvas.height / 3);
            createFirework(canvas.width / 4, canvas.height / 2);
            createFirework(canvas.width * 0.75, canvas.height / 2);

            setInterval(() => {
                const randomX = Math.random() * canvas.width;
                const randomY = Math.random() * (canvas.height / 2) + 100;
                createFirework(randomX, randomY);
            }, 1000);
        }
    </script>
</body>
</html>
