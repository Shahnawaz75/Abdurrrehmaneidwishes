<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Bakra Eid Surprise For You!</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #0a2f1d, #02110a); /* Emerald Green Theme */
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
        }

        /* Initial Name Input Form */
        .form-box {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(255, 215, 0, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 90%;
            width: 400px;
            z-index: 10;
            transition: all 0.5s ease;
        }

        .gift-icon {
            font-size: 60px;
            margin-bottom: 15px;
            animation: bounce 1.2s infinite alternate;
        }

        h2 {
            font-size: 1.6rem;
            margin-bottom: 20px;
            color: #ffd700;
        }

        .name-input {
            width: 100%;
            padding: 12px 20px;
            font-size: 1.1rem;
            border: 2px solid #ffd700;
            border-radius: 50px;
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            outline: none;
            text-align: center;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .name-input:focus {
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
        }

        .surprise-btn {
            background: linear-gradient(45deg, #ffd700, #ffaa00);
            color: #000;
            border: none;
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .surprise-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.7);
        }

        /* Magical Greeting Card (Hidden initially) */
        .card {
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 40px 30px;
            border-radius: 25px;
            box-shadow: 0 8px 32px 0 rgba(6, 214, 160, 0.3);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 90%;
            width: 450px;
            transform: scale(0) rotate(-10deg);
            opacity: 0;
            transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: none;
            z-index: 10;
        }

        .card.reveal {
            display: block;
            transform: scale(1) rotate(0deg);
            opacity: 1;
        }

        h1 {
            font-size: 2.8rem;
            margin: 0 0 10px 0;
            color: #ffd700;
            text-shadow: 0 0 15px #ffd700;
            animation: pulseGlow 2s infinite alternate;
        }

        .friend-name {
            font-size: 2.2rem;
            color: #ffaa00;
            margin: 10px 0;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 170, 0, 0.5);
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #e0e1dd;
        }

        .sender {
            font-size: 1.8rem;
            font-weight: bold;
            color: #06d6a0;
            text-shadow: 0 0 15px rgba(6, 214, 160, 0.6);
            margin-top: 25px;
            border-top: 1px dashed rgba(255,255,255,0.2);
            padding-top: 15px;
        }

        /* Floating Bakra and Cow Elements */
        .animal {
            position: absolute;
            font-size: 35px;
            bottom: -50px;
            pointer-events: none;
            z-index: 2;
            animation: floatUp 6s linear infinite;
            opacity: 0.8;
        }

        /* Canvas for Fireworks */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-15px); }
        }

        @keyframes pulseGlow {
            from { text-shadow: 0 0 15px #ffd700; }
            to { text-shadow: 0 0 35px #ffaa00; }
        }

        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-105vh) translateX(50px) rotate(20deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas id="fireworksCanvas"></canvas>

    <audio id="eidMusic" loop>
        <source src="https://assets.mixkit.co/active_storage/sfx/123/123-200.wav" type="audio/wav">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
    </audio>

    <div class="form-box" id="nameForm">
        <div class="gift-icon">🐐🐄🎁</div>
        <h2>Your Bakra Eid Surprise is Waiting!</h2>
        <input type="text" id="userInput" class="name-input" placeholder="Enter Your Name Here..." required>
        <br>
        <button class="surprise-btn" onclick="revealSurprise()">See Surprise!</button>
    </div>

    <div class="card" id="greetingCard">
        <h1>🐏 Eid-ul-Adha Mubarak 🐄</h1>
        <div class="friend-name" id="displayName">Dear Friend</div>
        <p>May your plate be full of delicious mutton, beef, and kababs, and your heart full of endless joy on this Bakra Eid!</p>
        <div class="sender">With Love From:<br>✨ Abdur Rehman ✨</div>
    </div>

    <script>
        function revealSurprise() {
            var nameInput = document.getElementById('userInput').value.trim();
            
            if (nameInput === "") {
                alert("Please enter your name first! 😊");
                return;
            }

            document.getElementById('displayName').innerText = nameInput;
            document.getElementById('nameForm').style.display = 'none';
            
            var card = document.getElementById('greetingCard');
            card.style.display = 'block';
            setTimeout(function() {
                card.classList.add('reveal');
            }, 100);

            // Try to play festive audio background
            var audio = document.getElementById('eidMusic');
            audio.play().catch(function(error) {
                console.log("Audio autoplay prevented by browser. Will play on interaction.");
            });

            // Start Fireworks & Floating Animals
            initFireworks();
            startAnimalRain();
        }

        // --- Floating Bakra & Cow System ---
        function startAnimalRain() {
            const animals = ['🐐', '🐄', '🐏', '🎈', '✨'];
            setInterval(() => {
                const animalEl = document.createElement('div');
                animalEl.classList.add('animal');
                animalEl.innerText = animals[Math.floor(Math.random() * animals.length)];
                animalEl.style.left = Math.random() * 100 + 'vw';
                animalEl.style.animationDuration = (Math.random() * 3 + 4) + 's'; // 4 to 7 seconds
                document.body.appendChild(animalEl);

                setTimeout(() => {
                    animalEl.remove();
                }, 7000);
            }, 600);
        }

        // --- Fireworks System ---
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let particles = [];

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = Math.random() * 3 + 1;
                this.velocity = {
                    x: (Math.random() - 0.5) * 8,
                    y: (Math.random() - 0.5) * 8
                };
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.015;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.velocity.y += 0.05;
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= this.decay;
            }
        }

        function createFirework(x, y) {
            const colors = ['#ffd700', '#ffaa00', '#06d6a0', '#4cc9f0', '#ff007f', '#ffffff'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            for (let i = 0; i < 45; i++) {
                particles.push(new Particle(x, y, randomColor));
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.fillStyle = 'rgba(10, 47, 29, 0.2)'; // Emerald trail
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach((particle, index) => {
                if (particle.alpha <= 0) {
                    particles.splice(index, 1);
                } else {
                    particle.update();
                    particle.draw();
                }
            });
        }

        function initFireworks() {
            animate();
            createFirework(canvas.width / 2, canvas.height / 3);
            createFirework(canvas.width / 4, canvas.height / 2);
            createFirework(canvas.width * 0.75, canvas.height / 2);

            setInterval(() => {
                const randomX = Math.random() * canvas.width;
                const randomY = Math.random() * (canvas.height / 2) + 100;
                createFirework(randomX, randomY);
            }, 800);
        }
    </script>
</body>
</html>
